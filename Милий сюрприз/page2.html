<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Знайди пари 💖</title>

  <!-- Милий шрифт -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --color-soft: #ffc7c7;
      --color-accent: #ff6b8a;
      --text-shadow: 0 2px 10px rgba(255,255,255,0.7);
      --shadow: 0 8px 24px rgba(255,107,138,0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: "Comfortaa", sans-serif;
      background: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)), url("завантаження.gif") center center / cover no-repeat scroll;

      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .game-container {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    .title {
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--color-soft);
      text-shadow: var(--text-shadow);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--color-accent);
      text-shadow: var(--text-shadow);
      line-height: 1.4;
    }

    .memory-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .card {
      aspect-ratio: 1 / 1;
      border: none;
      background: transparent;
      cursor: pointer;
      perspective: 1000px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: var(--shadow);
    }

    /* Закрита картка */
    .card-back {
      background: var(--color-soft);
      border: 2px solid var(--color-accent);
    }

    /* Відкрита картка */
    .card-front {
      background: rgba(255,255,255,0.9);
      border: 2px solid var(--color-accent);
      transform: rotateY(180deg);
      font-size: 2rem;
    }

    /* Екран перемоги */
    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(4px);
      z-index: 20;
      padding: 24px;
    }

    .overlay-box {
      background: rgba(255,255,255,0.9);
      border-radius: 28px;
      padding: 28px 24px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    .overlay-box h2 {
      color: var(--color-accent);
      margin-bottom: 12px;
      font-size: 1.4rem;
    }

    .overlay-box p {
      color: var(--color-accent);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .btn {
      border: 2px solid var(--color-accent);
      background: var(--color-soft);
      color: var(--color-accent);
      font-family: "Comfortaa", sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      padding: 16px 22px;
      border-radius: 999px;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .memory-grid {
        gap: 10px;
      }

      .card-front {
        font-size: 1.7rem;
      }

      .title {
        font-size: 1.4rem;
      }

      .subtitle {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

  <div class="game-container">
    <div class="title">Знайди всі пари 💖</div>
    <div class="subtitle">
      Відкривай картки та шукай однакові емоджі 
    </div>

    <div class="memory-grid" id="memoryGrid"></div>
  </div>

  <!-- Перемога -->
  <div class="overlay" id="winOverlay">
    <div class="overlay-box">
      <h2>Ти знайшов всі пари! 🥰</h2>
      <p>Ти заслужив ще один сюрприз 💌</p>
      <button class="btn" onclick="goToNextPage()">
       я молодець?)
      </button>
    </div>
  </div>

  <script>
    const emojis = ["💖", "🌸", "🐻", "🎀", "✨", "🍓"];
    const cards = [...emojis, ...emojis];

    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let matchedPairs = 0;

    const memoryGrid = document.getElementById("memoryGrid");
    const winOverlay = document.getElementById("winOverlay");

    // Перемішування
    cards.sort(() => Math.random() - 0.5);

    // Створення карток
    cards.forEach((emoji) => {
      const card = document.createElement("button");
      card.className = "card";
      card.dataset.emoji = emoji;

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${emoji}</div>
        </div>
      `;

      card.addEventListener("click", flipCard);
      memoryGrid.appendChild(card);
    });

    function flipCard() {
      if (lockBoard) return;
      if (this === firstCard) return;
      if (this.classList.contains("matched")) return;

      this.classList.add("flipped");

      if (!firstCard) {
        firstCard = this;
        return;
      }

      secondCard = this;
      lockBoard = true;

      const isMatch =
        firstCard.dataset.emoji === secondCard.dataset.emoji;

      if (isMatch) {
        disableCards();
      } else {
        unflipCards();
      }
    }

    function disableCards() {
      firstCard.classList.add("matched");
      secondCard.classList.add("matched");

      matchedPairs++;

      resetBoard();

      if (matchedPairs === emojis.length) {
        setTimeout(() => {
          winOverlay.style.display = "flex";
        }, 600);
      }
    }

    function unflipCards() {
      setTimeout(() => {
        firstCard.classList.remove("flipped");
        secondCard.classList.remove("flipped");
        resetBoard();
      }, 900);
    }

    function resetBoard() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    function goToNextPage() {
      // Заміни на назву наступної сторінки
      window.location.href = "next-page3.html";
    }
  </script>

</body>
</html>
