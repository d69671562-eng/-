<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Милий сюрприз</title>

  <!-- Милий округлий шрифт -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      /* Кольори */
      --color-soft: #ffc7c7;   /* ніжно рожевий з персиковим відтінком */
      --color-accent: #ff6b8a; /* рожево-червоний */
      --text-shadow: 0 2px 10px rgba(255, 255, 255, 0.7);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background-color: #000;

      /* Повертаємо попередній фоновий GIF */
      background: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)), url("завантаження.gif") center center / cover no-repeat scroll;

      font-family: "Comfortaa", sans-serif;
    }

    /* Прозорий контейнер без додаткового розмиття */
    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 32px 24px;
      background: transparent;
      border: none;
      border-radius: 28px;
    }

    .emoji {
      margin-bottom: 20px;
    }

    .emoji-image {
      width: 220px;
      max-width: 100%;
      height: auto;
      display: inline-block;
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
    }

    .title-1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--color-soft);
      text-shadow: var(--text-shadow);
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .title-2,
    .title-3 {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--color-accent);
      text-shadow: var(--text-shadow);
      line-height: 1.4;
    }

    .title-2 {
      margin-bottom: 28px;
    }

    .title-3 {
      margin-bottom: 24px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: 2px solid var(--color-accent);
      background: var(--color-soft);
      color: var(--color-accent);
      font-family: "Comfortaa", sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      padding: 16px 22px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 12px rgba(255, 107, 138, 0.18);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 18px rgba(255, 107, 138, 0.25);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .hidden {
      display: none;
    }

    /* Мобільна адаптація */
    @media (max-width: 480px) {
      .card {
        max-width: 100%;
        padding: 24px 16px;
      }

      .emoji-image {
        width: 180px;
      }

      .title-1 {
        font-size: 2rem;
      }

      .title-2,
      .title-3 {
        font-size: 1.15rem;
      }

      .buttons {
        flex-direction: column;
        gap: 12px;
      }

      .btn {
        width: 100%;
        font-size: 1.05rem;
        padding: 14px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Початковий екран -->
    <div id="main-screen">
      <div class="emoji">
        <img class="emoji-image" src="happy.gif" alt="happy" onerror="this.style.display='none'" />
      </div>

      <h1 class="title-1">Привіт, милий</h1>
      <p class="title-2">Хочеш побачити мій подарунок?</p>

      <div class="buttons">
        <!-- Перехід на наступну сторінку -->
        <button class="btn" onclick="goToCodePage()">
          так, люба
        </button>

        <!-- Показує сумний екран -->
        <button class="btn" onclick="showSadScreen()">
          ні, дякую
        </button>
      </div>
    </div>

    <!-- Сумний екран -->
    <div id="sad-screen" class="hidden">
      <div class="emoji">
        <img class="emoji-image" src="sad.gif" alt="sad" onerror="this.style.display='none'" />
      </div>
      <p class="title-3">Поглянь, будь ласка, я дуже старалась:(</p>

      <button class="btn" onclick="showMainScreen()">
        вибач, давай знову
      </button>
    </div>

  </div>

  <script>
    const mainScreen = document.getElementById("main-screen");
    const sadScreen = document.getElementById("sad-screen");

    function showSadScreen() {
      mainScreen.classList.add("hidden");
      sadScreen.classList.remove("hidden");
    }

    function showMainScreen() {
      sadScreen.classList.add("hidden");
      mainScreen.classList.remove("hidden");
    }

    function goToCodePage() {
      // Тут буде сторінка з кодом.
      // Коли створимо її, достатньо буде змінити на:
      // window.location.href = "code.html";

      window.location.href = "code.html";
    }
  </script>
</body>
</html>
