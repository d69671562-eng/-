<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мій лист для тебе 💌</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --soft: #ffc7c7;
      --accent: #ff6b8a;
      --paper: #fffafc;
      --paper-border: #f7c7d6;
      --shadow: 0 12px 35px rgba(255, 107, 138, 0.2);
      --text-shadow: 0 2px 10px rgba(255,255,255,0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Comfortaa", sans-serif;
      background: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)), url("завантаження.gif") center center / cover no-repeat scroll;
      overflow-x: hidden;
      padding: 0;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
      padding: 30px 16px;
    }

    /* Заголовок */
    .title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--soft);
      text-shadow: var(--text-shadow);
      margin-bottom: 28px;
      line-height: 1.3;
    }

    /* ===== КОНВЕРТ ===== */
    .envelope-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
      position: relative;
      z-index: 5;
    }

    .envelope {
      position: relative;
      width: min(90vw, 360px);
      aspect-ratio: 1.45 / 1;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .envelope:hover {
      transform: scale(1.03);
    }

    /* Нижня частина */
    .envelope-body {
      position: absolute;
      inset: 0;
      background: #ffe2ea;
      border: 2px solid #f7b9c8;
      border-radius: 0 0 26px 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* Бокові клапани */
    .envelope-body::before,
    .envelope-body::after {
      content: "";
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: #ffd5e1;
    }

    .envelope-body::before {
      left: 0;
      clip-path: polygon(0 0, 100% 50%, 0 100%);
    }

    .envelope-body::after {
      right: 0;
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
    }

    /* Верхній клапан */
    .flap {
      position: absolute;
      inset: 0;
      background: #ffcfdc;
      clip-path: polygon(0 0, 100% 0, 50% 58%);
      transform-origin: top center;
      transition: transform 1s ease;
      z-index: 4;
      border-top-left-radius: 22px;
      border-top-right-radius: 22px;
    }

    /* Сердечко */
    .seal {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      font-size: 2.4rem;
      z-index: 6;
      transition: opacity 0.4s ease;
    }

    /* Лист, який трохи виглядає з конверта */
    .paper-preview {
      position: absolute;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      width: 82%;
      height: 72%;
      background: var(--paper);
      border-radius: 18px 18px 6px 6px;
      z-index: 1;
    }

    .tap-text {
      margin-top: 14px;
      color: var(--accent);
      font-size: 0.95rem;
      font-weight: 600;
      text-shadow: var(--text-shadow);
    }

    /* Відкритий конверт */
    .opened .flap {
      transform: rotateX(180deg);
    }

    .opened .seal {
      opacity: 0;
    }

    /* ===== МОДАЛЬНЕ ВІКНО З ЛИСТОМ ===== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
      padding: 30px 16px;
      z-index: 100;
    }

    .modal.show {
      display: flex;
      animation: fadeIn 0.8s ease;
    }

    .letter {
      width: 100%;
      max-width: 760px;
      background: var(--paper);
      border: 3px solid var(--paper-border);
      border-radius: 28px;
      padding: 40px 28px;
      box-shadow: var(--shadow);
      position: relative;
      margin-top: 20px;
    }

    .letter::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 2px dashed var(--paper-border);
      border-radius: 18px;
      pointer-events: none;
    }

    .letter-content {
      position: relative;
      z-index: 2;
      text-align: left;
    }

    .letter-content p {
      color: #d85b7f;
      font-size: 1rem;
      line-height: 1.9;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .signature {
      margin-top: 28px;
      text-align: right;
      color: #d85b7f;
      font-weight: 700;
    }

    /* Кнопка */
    .bottom-button {
      margin-top: 28px;
      text-align: center;
    }

    .btn {
      border: 2px solid var(--accent);
      background: var(--soft);
      color: var(--accent);
      font-family: "Comfortaa", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 999px;
      text-decoration: none;
      display: inline-block;
      transition: all 0.25s ease;
      box-shadow: 0 4px 12px rgba(255,107,138,0.15);
    }

    .btn:hover {
      transform: scale(1.03);
    }

    /* ===== СЕРДЕЧКА ===== */
    .heart {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      animation: burst 2.2s ease-out forwards;
    }

    @keyframes burst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(0.5);
      }
      100% {
        opacity: 0;
        transform:
          translate(var(--x), var(--y))
          scale(var(--scale))
          rotate(var(--rotate));
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Мобільна версія */
    @media (max-width: 768px) {
      .title {
        font-size: 1.6rem;
      }

      .letter {
        padding: 30px 20px;
      }

      .letter-content p {
        font-size: 0.95rem;
        line-height: 1.8;
      }

      .btn {
        width: 100%;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="title">Мій лист для тебе 💌</h1>

    <div class="envelope-section">
      <div class="envelope" id="envelope" onclick="openLetter()">
        <div class="paper-preview"></div>
        <div class="envelope-body"></div>
        <div class="flap"></div>
        <div class="seal">💖</div>
      </div>

      <p class="tap-text" id="tapText">
        Натисни на конверт, щоб відкрити лист ✨
      </p>
    </div>
  </div>

  <!-- Модальне вікно -->
  <div class="modal" id="letterModal">
    <div class="letter">
      <div class="letter-content">
        <p>
          Тут буде твій любовний лист. Напиши все, що хочеш сказати:
          про свої почуття, найтепліші спогади та мрії 💖
        </p>

        <p>
          Розмір листа автоматично підлаштовується під кількість тексту.
        </p>

        <div class="signature">
          З любов’ю, твій 💕
        </div>
      </div>

      <div class="bottom-button">
        <a href="index.html" class="btn">
          Повернутися на початок 💖
        </a>
      </div>
    </div>
  </div>

  <script>
    let opened = false;

    function openLetter() {
      if (opened) return;
      opened = true;

      const envelope = document.getElementById("envelope");
      const tapText = document.getElementById("tapText");
      const modal = document.getElementById("letterModal");

      envelope.classList.add("opened");
      tapText.style.display = "none";

      createHearts();

      setTimeout(() => {
        modal.classList.add("show");
      }, 900);
    }

    function createHearts() {
      const symbols = ["💖", "💕", "💗", "💘", "💝", "🌸"];
      const envelope = document.getElementById("envelope");
      const rect = envelope.getBoundingClientRect();

      const startX = rect.left + rect.width / 2;
      const startY = rect.top + rect.height / 2;

      for (let i = 0; i < 35; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent =
          symbols[Math.floor(Math.random() * symbols.length)];

        heart.style.left = startX + "px";
        heart.style.top = startY + "px";
        heart.style.fontSize = (16 + Math.random() * 28) + "px";

        heart.style.setProperty(
          "--x",
          (Math.random() - 0.5) * 700 + "px"
        );
        heart.style.setProperty(
          "--y",
          (-80 - Math.random() * 400) + "px"
        );
        heart.style.setProperty(
          "--scale",
          0.8 + Math.random() * 1.6
        );
        heart.style.setProperty(
          "--rotate",
          (-180 + Math.random() * 360) + "deg"
        );

        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 2300);
      }
    }
  </script>

</body>
</html>
