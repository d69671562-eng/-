<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Галерея</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --color-accent: #ff6b8a;
      --color-soft: #ffc7c7;
      --text-shadow: 0 2px 10px rgba(255, 255, 255, 0.7);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Comfortaa",sans-serif;background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), url("завантаження.gif") center center / cover no-repeat scroll;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
    .container{max-width:1100px;width:100%}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:28px;margin-bottom:28px}
    .card{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:inherit;background:transparent;padding:0;border:none;border-radius:0;box-shadow:none;transition:transform .18s ease}
    .thumb{width:100%;aspect-ratio:1/1;overflow:hidden;border-radius:10px}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .caption{margin-top:8px;font-size:2.4rem;font-weight:700;line-height:1.2;text-align:center;background:transparent;color:var(--color-soft);text-shadow:var(--text-shadow)}
    .actions{text-align:center;margin-top:18px}
    .back-btn{display:inline-block;border:2px solid var(--color-accent);background:var(--color-soft);color:var(--color-accent);font-size:1.15rem;font-weight:700;padding:16px 22px;border-radius:999px;text-decoration:none;box-shadow:0 4px 12px rgba(255,107,138,0.15);transition:all 0.25s ease}
    .back-btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 18px rgba(255,107,138,0.25)}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.grid{grid-template-columns:1fr;gap:20px}.thumb img{max-width:180px}.caption{font-size:.95rem}}
  </style>
</head>
<body>
  <div class="container">
    <div class="grid">
      <a href="page1.html" class="card">
        <div class="thumb"><img src="gif1.gif" alt="GIF 1" /></div>
        <div class="caption">Попасти (в сердечко)</div>
      </a>
      <a href="page2.html" class="card">
        <div class="thumb"><img src="gif2.gif" alt="GIF 2" /></div>
        <div class="caption">Милі парочки</div>
      </a>
      <a href="page3.html" class="card">
        <div class="thumb"><img src="gif3.gif" alt="GIF 3" /></div>
        <div class="caption">Поле чудес</div>
      </a>
      <a href="page4.html" class="card">
        <div class="thumb"><img src="gif4.gif" alt="GIF 4" /></div>
        <div class="caption">Шустрий котик</div>
      </a>
    </div>
    <div class="actions">
      <a href="code.html" class="back-btn">хочу повернутись</a>
    </div>
  </div>
</body>
</html>
