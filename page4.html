<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Збери 26 сердечок 💖</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet" />

<style>
:root {
  --color-soft: #ffc7c7;
  --color-accent: #ff6b8a;
  --color-paper: #ffe4ec;
  --text-shadow: 0 2px 10px #ff6b8a;
  --box-shadow: 0 12px 35px #ffc7c7;
}
.win-gif {
  display: block;
  width: 100%;
  max-width: 180px;
  margin: 0 auto 20px;
  border-radius: 18px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  touch-action: none;
  user-select: none;
}

body {
  min-height: 100vh;
  overflow: hidden;
  font-family: "Comfortaa", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url("завантаження.gif") center center / cover no-repeat fixed;
}

.game-wrapper {
  position: relative;
  width: min(100%, 420px);
  height: min(90vh, 760px);
  overflow: hidden;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* ===== HUD ===== */
.hud {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  text-align: center;
  z-index: 10;
  pointer-events: none;
}

.score {
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--color-soft);
  text-shadow: var(--text-shadow);
  margin-bottom: 8px;
}

.hint {
 font-size: 2.4rem;
  font-weight: 700;
  color: var(--color-accent);
  text-shadow: var(--text-shadow);
  line-height: 1.2;
}

/* ===== ВІКНО ПЕРЕМОГИ ===== */
.overlay {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;

  background: rgba(255, 255, 255, 0.35);

  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);

  z-index: 20;
  padding: 24px;
}

.overlay-box {
  background: rgba(255, 255, 255, 0.88);

  padding: 28px 24px;
  border-radius: 28px;

  text-align: center;

  max-width: 360px;
  width: 100%;
}

.overlay-box h2 {
  color: var(--color-accent);
  font-size: 1.4rem;
  margin-bottom: 12px;
}

.overlay-box p {
  color: var(--color-accent);
  line-height: 1.5;
  margin-bottom: 20px;
}
.win-gif {
 width: 140px;
 height: auto;
 margin-bottom: 16px;
  border-radius: 16px; 
}
.btn {
  border: 2px solid var(--color-accent);

  background: var(--color-soft);
  color: var(--color-accent);

  font-family: "Comfortaa", sans-serif;
  font-size: 1.15rem;
  font-weight: 700;

  padding: 16px 22px;

  border-radius: 999px;

  cursor: pointer;

  text-decoration: none;
  display: inline-block;
}

.btn:hover {
  transform: scale(1.03);
}

 /* МОБІЛЬНА ВЕРСІЯ */
    @media (max-width: 480px) {
    .score {
    font-size: 1.4rem;
   }

    .hint {
    font-size: 0.85rem;
   }

    .star {
   font-size: 2rem;
   }

   .win-box {
   padding: 22px 18px;
   }

   .win-gif {
   width: 110px;
   }

  .btn {
     font-size: 0.95rem;
        padding: 12px 18px;
      }
    }

</style>
</head>
<body>

<div class="game-wrapper" id="gameWrapper">
  <div class="hud">
    <div class="score">💖 <span id="score">0</span> / 26</div>
    <div class="hint">Збирай сердечка на платформах, але не падай</div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="overlay" id="winOverlay">
  <div class="overlay-box">

    <!-- GIF над заголовком -->
    <img
      src="happy.gif"
      alt="Переможна GIF"
      class="win-gif"
    />

    <h2>Ти зібрав 26 сердечок! 🥰</h2>

    <button class="btn" onclick="goToNextPage()">
      крутяк)
    </button>
  </div>
</div>
</div>

<script>
/* ===== НАЛАШТУВАННЯ ===== */
const TARGET_SCORE = 26;

const PLATFORM_COUNT = 8;
const PLATFORM_GAP = 150;
const PLATFORM_WIDTH = 100;
const PLATFORM_HEIGHT = 14;
const MIN_HORIZONTAL_DISTANCE = 170;
const HEART_CHANCE = 0.35;
const TOP_SAFE_ZONE = 130;

/* ===== DOM ===== */
const scoreElement = document.getElementById("score");
const winOverlay = document.getElementById("winOverlay");
const wrapper = document.getElementById("gameWrapper");
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

/* ===== РОЗМІРИ ===== */
let width, height;

function resizeCanvas() {
  width = wrapper.clientWidth;
  height = wrapper.clientHeight;
  canvas.width = width;
  canvas.height = height;
}

/* ===== ЗОБРАЖЕННЯ ГРАВЦЯ ===== */
const playerImage = new Image();
playerImage.src = "snoopy.gif";

/* ===== ГРАВЕЦЬ ===== */
const player = {
  x: 0,
  y: 0,
  width: 60,
  height: 60,
  velocityY: 0,
  jumpPower: -12.33,
  gravity: 0.48
};

const platforms = [];
const hearts = [];

let score = 0;
let gameWon = false;
let targetX = 0;

/* ===== СТВОРЕННЯ ПЛАТФОРМИ ===== */
function createPlatform(y) {
  if (y < TOP_SAFE_ZONE) y = TOP_SAFE_ZONE;

  let x = 0;
  let valid = false;
  let attempts = 0;

  while (!valid && attempts < 500) {
    x = Math.random() * (width - PLATFORM_WIDTH);
    valid = true;

    for (const platform of platforms) {
      const verticalDistance = Math.abs(y - platform.y);

      if (verticalDistance < PLATFORM_GAP + 30) {
        const horizontalDistance = Math.abs(x - platform.x);

        if (horizontalDistance < MIN_HORIZONTAL_DISTANCE) {
          valid = false;
          break;
        }
      }
    }

    attempts++;
  }

  if (!valid) {
    x = Math.random() * (width - PLATFORM_WIDTH);
  }

  const platform = {
    x,
    y,
    width: PLATFORM_WIDTH,
    height: PLATFORM_HEIGHT
  };

  platforms.push(platform);

  // Максимум 1 сердечко на платформі
  if (Math.random() < HEART_CHANCE) {
    hearts.push({
      x: platform.x + platform.width / 2,
      y: platform.y - 20,
      collected: false
    });
  } else {
    hearts.push(null);
  }
}

/* ===== ІНІЦІАЛІЗАЦІЯ ===== */
function initGame() {
  platforms.length = 0;
  hearts.length = 0;

  score = 0;
  gameWon = false;

  scoreElement.textContent = score;
  winOverlay.style.display = "none";

  for (let i = 0; i < PLATFORM_COUNT; i++) {
    createPlatform(height - 80 - i * PLATFORM_GAP);
  }

  player.x = width / 2 - player.width / 2;
  player.y = height - 140;
  player.velocityY = player.jumpPower;

  targetX = player.x + player.width / 2;
}

/* ===== МАЛЮВАННЯ ЗАКРУГЛЕНОГО ПРЯМОКУТНИКА ===== */
function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

/* ===== ОНОВЛЕННЯ ГРИ ===== */
function update() {
  if (gameWon) return;

  player.x += (targetX - (player.x + player.width / 2)) * 0.22;

  if (player.x < -player.width) player.x = width;
  if (player.x > width) player.x = -player.width;

  player.velocityY += player.gravity;
  player.y += player.velocityY;

  // Зіткнення з платформами
  for (const platform of platforms) {
    if (
      player.velocityY > 0 &&
      player.x + player.width > platform.x &&
      player.x < platform.x + platform.width &&
      player.y + player.height > platform.y &&
      player.y + player.height < platform.y + platform.height + 18
    ) {
      player.velocityY = player.jumpPower;
      break;
    }
  }

  // Збір сердечок
  for (const heart of hearts) {
    if (!heart || heart.collected) continue;

    const dx = player.x + player.width / 2 - heart.x;
    const dy = player.y + player.height / 2 - heart.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < 35) {
      heart.collected = true;
      score++;
      scoreElement.textContent = score;

      if (score >= TARGET_SCORE) {
        winGame();
        return;
      }
    }
  }

  // Скролінг вгору
  if (player.y < height * 0.35) {
    const offset = height * 0.35 - player.y;
    player.y = height * 0.35;

    platforms.forEach(p => p.y += offset);
    hearts.forEach(h => {
      if (h) h.y += offset;
    });

    while (platforms.length && platforms[0].y > height) {
      platforms.shift();
      hearts.shift();
      createPlatform(-20);
    }
  }

  // Падіння
  if (player.y > height + 100) {
    initGame();
  }
}

/* ===== МАЛЮВАННЯ ===== */
function draw() {
  ctx.clearRect(0, 0, width, height);

  // Платформи
  ctx.fillStyle = "rgba(255, 199, 199, 0.95)";
  for (const platform of platforms) {
    drawRoundedRect(
      platform.x,
      platform.y,
      platform.width,
      platform.height,
      8
    );
  }

  // Сердечка
  ctx.font = "24px sans-serif";
  for (const heart of hearts) {
    if (heart && !heart.collected) {
      ctx.fillText("💖", heart.x - 12, heart.y + 8);
    }
  }

  // Гравець
  if (playerImage.complete && playerImage.naturalWidth > 0) {
    ctx.drawImage(
      playerImage,
      player.x,
      player.y,
      player.width,
      player.height
    );
  } else {
    ctx.font = "48px sans-serif";
    ctx.fillText("🐻", player.x, player.y + 48);
  }
}

/* ===== ЦИКЛ ГРИ ===== */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

/* ===== ПЕРЕМОГА ===== */
function winGame() {
  gameWon = true;
  setTimeout(() => {
    winOverlay.style.display = "flex";
  }, 400);
}

function goToNextPage() {
  window.location.href = "next-page2.html";
}

/* ===== КЕРУВАННЯ ===== */
wrapper.addEventListener("mousemove", e => {
  const rect = wrapper.getBoundingClientRect();
  targetX = e.clientX - rect.left;
});

wrapper.addEventListener("touchmove", e => {
  const rect = wrapper.getBoundingClientRect();
  targetX = e.touches[0].clientX - rect.left;
  e.preventDefault();
}, { passive: false });

/* ===== СТАРТ ===== */
resizeCanvas();
initGame();
loop();

window.addEventListener("resize", () => {
  resizeCanvas();
  initGame();
});
</script>

</body>
</html>
